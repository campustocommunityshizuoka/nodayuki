<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in Space | Yuki Noda</title>
    <meta name="theme-color" content="#080c06">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23080c06' stroke='%23b8f05c' stroke-width='3'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-weight='900' font-size='56' text-anchor='middle' fill='%23b8f05c' font-style='italic'%3EY%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .err-wrap {
            text-align: center;
            position: relative;
            z-index: 5;
            padding: 0 5vw;
            max-width: 720px;
        }

        .err-num {
            font-family: var(--font-display);
            font-size: clamp(8rem, 22vw, 18rem);
            font-weight: 900;
            letter-spacing: -10px;
            line-height: 0.85;
            color: var(--accent);
            margin: 0;
            text-shadow: 0 0 60px rgba(184, 240, 92, 0.25);
            font-style: italic;
            position: relative;
            display: inline-block;
        }

        .err-num::before,
        .err-num::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            mix-blend-mode: screen;
        }

        .err-num::before {
            color: #ff4dff;
            animation: glitchA 3.4s infinite ease-in-out;
        }

        .err-num::after {
            color: #4dffff;
            animation: glitchB 3.4s infinite ease-in-out;
        }

        @keyframes glitchA {
            0%, 90%, 100% { transform: translate(0, 0); opacity: 0; }
            91%, 96% { transform: translate(-5px, 2px); opacity: 0.7; }
        }

        @keyframes glitchB {
            0%, 88%, 100% { transform: translate(0, 0); opacity: 0; }
            89%, 95% { transform: translate(5px, -2px); opacity: 0.7; }
        }

        .err-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: var(--text-muted);
            margin: 30px 0 14px;
            text-transform: uppercase;
        }

        .err-title {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            font-weight: 700;
            color: var(--text);
            margin: 0 0 20px;
            line-height: 1.2;
        }

        .err-title em {
            color: var(--accent);
            font-style: italic;
        }

        .err-desc {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 50px;
            line-height: 1.7;
        }

        .err-back {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: color 0.3s ease;
            border-radius: 999px;
        }

        .err-back::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: -1;
        }

        .err-back:hover {
            color: var(--bg);
        }

        .err-back:hover::before {
            transform: scaleX(1);
        }

        .err-rocket {
            position: absolute;
            font-size: 3rem;
            top: 18%;
            left: 14%;
            animation: lostRocket 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(184, 240, 92, 0.5));
            z-index: 2;
        }

        @keyframes lostRocket {
            0%, 100% { transform: translate(0, 0) rotate(15deg); }
            25% { transform: translate(20px, -30px) rotate(35deg); }
            50% { transform: translate(60px, 20px) rotate(60deg); }
            75% { transform: translate(20px, 40px) rotate(35deg); }
        }

        .err-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .err-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: starTwinkle var(--dur, 2s) ease-in-out infinite;
            animation-delay: var(--del, 0s);
            opacity: 0;
        }

        .err-back-link {
            margin-top: 40px;
            display: inline-block;
        }
    </style>
</head>

<body class="loaded">

    <div class="grain"></div>

    <div class="err-stars" id="errStars"></div>

    <div class="err-rocket" aria-hidden="true">🚀</div>

    <div class="err-wrap">
        <h1 class="err-num">404</h1>
        <div class="err-label">— LOST IN SPACE —</div>
        <h2 class="err-title">このページは <em>軌道を外れました</em>。</h2>
        <p class="err-desc">
            お探しのページは、宇宙のどこかに迷い込んでしまったようです。<br>
            ホームへ戻って、もう一度旅を始めましょう。
        </p>
        <a href="/" class="err-back">
            ← BACK TO HOME
        </a>
    </div>

    <script>
        (function () {
            const c = document.getElementById('errStars');
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'err-star';
                const sz = 1 + Math.random() * 2.5;
                s.style.cssText = [
                    'width:' + sz + 'px',
                    'height:' + sz + 'px',
                    'left:' + (Math.random() * 100) + '%',
                    'top:' + (Math.random() * 100) + '%',
                    '--dur:' + (1.2 + Math.random() * 3) + 's',
                    '--del:' + (Math.random() * 5) + 's',
                    '--star-opacity:' + (0.4 + Math.random() * 0.6)
                ].join(';');
                c.appendChild(s);
            }
        })();
    </script>
</body>

</html>
